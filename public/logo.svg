<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C8FF"/>
      <stop offset="100%" style="stop-color:#0080FF"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;display=swap');
      .logo-next { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 32px; fill: #ffffff; letter-spacing: 3px; text-transform: uppercase; }
      .logo-level { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 32px; fill: url(#grad); letter-spacing: 3px; text-transform: uppercase; }
      .logo-sub { font-family: 'Oswald', sans-serif; font-weight: 400; font-size: 10px; fill: #555555; letter-spacing: 6px; text-transform: uppercase; }
    </style>
  </defs>
  <text class="logo-next" x="0" y="36">NEXT</text>
  <text class="logo-level" x="90" y="36">LEVEL</text>
  <line x1="198" y1="10" x2="198" y2="40" stroke="#333333" stroke-width="1"/>
  <text class="logo-sub" x="208" y="30">ACADEMY</text>
</svg>
